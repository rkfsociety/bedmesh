name: Build Windows (PyQt6) App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-pyqt6:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bedmesh/win/pyqt6/requirements.txt
          pip install requests pyinstaller

      - name: Build exe (PyInstaller)
        shell: bash
        run: |
          python -m PyInstaller --onefile --noconsole \
            --name "Bed.Mesh.Visualizer" \
            --add-data "win/pyqt6/ui/locale;ui/locale" \
            win/pyqt6/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedMeshVisualizer-Win-PyQt6
          path: dist/Bed.Mesh.Visualizer.exe

      - name: Remove legacy assets from existing release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const keepName = 'Bed.Mesh.Visualizer.exe';
            const legacyNames = new Set([
              'BedMeshVisualizer_Win_PyQt6.exe',
              'BedMeshVisualizer-Win-PyQt6.exe',
            ]);

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (e) {
              core.info(`No existing release for ${tag}; skipping cleanup.`);
              return;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner, repo, release_id: release.data.id, per_page: 100,
            });

            for (const a of assets) {
              if (a.name === keepName) continue;
              if (legacyNames.has(a.name)) {
                core.info(`Deleting legacy asset: ${a.name}`);
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
              }
            }

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Bed.Mesh.Visualizer.exe
          name: "${{ github.ref_name }}"
          body: |
            ## Что нового
            - Тихая проверка обновлений при запуске
            - Статус версии и кнопка обновления внизу правой панели

            ## Скачать
            - `Bed.Mesh.Visualizer.exe`

      - name: Remove legacy assets after publish
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const keepName = 'Bed.Mesh.Visualizer.exe';
            const legacyNames = new Set([
              'BedMeshVisualizer_Win_PyQt6.exe',
              'BedMeshVisualizer-Win-PyQt6.exe',
            ]);

            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner, repo, release_id: release.data.id, per_page: 100,
            });

            for (const a of assets) {
              if (a.name === keepName) continue;
              if (legacyNames.has(a.name)) {
                core.info(`Deleting legacy asset: ${a.name}`);
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
              }
            }


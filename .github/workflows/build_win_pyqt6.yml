name: Build Windows (PyQt6) App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-pyqt6:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bedmesh/win/pyqt6/requirements.txt
          pip install requests pyinstaller

      - name: Build exe (PyInstaller)
        shell: bash
        run: |
          python -m PyInstaller --onefile --noconsole \
            --name "Bed.Mesh.Visualizer" \
            --add-data "win/pyqt6/ui/locale;ui/locale" \
            win/pyqt6/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedMeshVisualizer-Win-PyQt6
          path: dist/Bed.Mesh.Visualizer.exe

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Bed.Mesh.Visualizer.exe
          name: "${{ github.ref_name }}"
          body: |
            ## Что нового
            - Тихая проверка обновлений при запуске
            - Статус версии и кнопка обновления внизу правой панели

            ## Скачать
            - `Bed.Mesh.Visualizer.exe`


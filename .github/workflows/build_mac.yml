name: Сборка macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter paramiko requests numpy matplotlib pyinstaller

      - name: Сборка и упаковка
        run: |
          # 1. Заходим в папку с мак-версией
          cd mac
          
          # 2. Проверяем список файлов (для логов, если что-то пойдет не так)
          ls -la
          
          # 3. Запускаем сборку
          python -m PyInstaller --onefile --windowed \
            --name "BedMeshVisualizer_Mac" \
            --add-data "icon.png:." \
            --collect-all customtkinter \
            --hidden-import=paramiko \
            --hidden-import=requests \
            --hidden-import=numpy \
            --hidden-import=matplotlib \
            main_mac.py
          
          # 4. Установка утилиты для DMG (если еще нет)
          brew install create-dmg
          
          # 5. Создание DMG образа
          mkdir -p dist/dmg
          create-dmg \
            --volname "Установщик Bed Mesh Visualizer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "BedMeshVisualizer_Mac.app" 200 190 \
            --hide-extension "BedMeshVisualizer_Mac.app" \
            --app-drop-link 600 185 \
            "dist/dmg/BedMeshVisualizer_v0.083.dmg" \
            "dist/BedMeshVisualizer_Mac.app"

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: BedMeshVisualizer-MacOS-DMG
          path: mac/dist/dmg/*.dmg
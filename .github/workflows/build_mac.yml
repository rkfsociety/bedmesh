name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter paramiko requests numpy matplotlib pyinstaller

      - name: Build with PyInstaller
        run: |
          cd mac
          python -m PyInstaller --onefile --windowed \
          --name "BedMeshVisualizer_Mac" \
          --add-data "icon.png:." \
          --collect-all customtkinter \
          --hidden-import=paramiko \
          --hidden-import=requests \
          --hidden-import=numpy \
          --hidden-import=matplotlib \
          main_mac.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          cd mac
          mkdir -p dist/dmg
          create-dmg \
            --volname "BedMeshVisualizer Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "BedMeshVisualizer_Mac.app" 200 190 \
            --hide-extension "BedMeshVisualizer_Mac.app" \
            --app-drop-link 600 185 \
            "dist/dmg/BedMeshVisualizer_v0.083.dmg" \
            "dist/BedMeshVisualizer_Mac.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedMeshVisualizer-MacOS-DMG
          path: mac/dist/dmg/*.dmg